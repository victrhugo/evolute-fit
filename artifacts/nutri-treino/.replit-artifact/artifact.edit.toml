kind = "web"
previewPath = "/"
title = "Elevate - Plano Personalizado"
version = "1.0.0"
id = "nutri-treino-artifact-main"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24870

[services.development]
run = "pnpm --filter @workspace/nutri-treino run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nutri-treino", "run", "build" ]
publicDir = "artifacts/nutri-treino/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24870"
BASE_PATH = "/"
